<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pregunta importante</title>
<style>
body{
    background: pink;
    text-align: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
}
h1{
    margin-top: 100px;
    font-size: 40px;
}
button{
    padding: 15px 30px;
    font-size: 20px;
    margin: 20px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
}
#si{
    background: red;
    color: white;
}
#no{
    background: white;
    position: absolute;
}
</style>
</head>

<body>

<h1>¿Quieres ser mi novia? ❤️</h1>

<button id="si" onclick="aceptar()">Sí 💖</button>
<button id="no">No 😢</button>

<script>
const botonNo = document.getElementById("no");

botonNo.addEventListener("mouseover", function(){
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    botonNo.style.left = x + "px";
    botonNo.style.top = y + "px";
});

function aceptar(){
    document.body.innerHTML = "<h1>Sabía que dirías que sí 😍💍</h1>";
}
</script>

</body>
</html>
