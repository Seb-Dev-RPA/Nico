<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Nicole ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    background: linear-gradient(135deg, #ffd6e8, #ffeef5);
    font-family: Arial, sans-serif;
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:80px;
    font-size:28px;
    padding:20px;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    margin:15px;
    cursor:pointer;
    transition:0.3s;
}

#si{
    background:#ff4d6d;
    color:white;
}

#no{
    background:white;
    position:absolute;
}

.emoji{
    position:absolute;
    font-size:24px;
    animation: float 6s linear infinite;
}

@keyframes float{
    from{ transform: translateY(100vh); }
    to{ transform: translateY(-10vh); }
}
</style>
</head>

<body>

<h1>Nicole… 🐱🦫<br>¿Quieres ser mi novia? 💖</h1>

<button id="si">Sí 💕</button>
<button id="no">No 😢</button>

<script>
const botonNo = document.getElementById("no");
const botonSi = document.getElementById("si");

let escala = 1;

function moverBoton(){
    const ancho = window.innerWidth - 100;
    const alto = window.innerHeight - 50;
    const x = Math.random() * ancho;
    const y = Math.random() * alto;
    botonNo.style.left = x + "px";
    botonNo.style.top = y + "px";

    escala += 0.1;
    botonSi.style.transform = "scale(" + escala + ")";
}

botonNo.addEventListener("touchstart", moverBoton);
botonNo.addEventListener("click", moverBoton);

botonSi.addEventListener("click", function(){
    document.body.innerHTML = `
        <h1>Sabía que dirías que sí 😍🐱🦫<br>
        Ahora oficialmente eres mi persona favorita 💘</h1>
    `;
    lanzarEmojis();
});

function lanzarEmojis(){
    for(let i=0;i<20;i++){
        const emoji = document.createElement("div");
        emoji.classList.add("emoji");
        emoji.innerHTML = ["🐱","🦫","💖","💕"][Math.floor(Math.random()*4)];
        emoji.style.left = Math.random()*100 + "vw";
        emoji.style.animationDuration = (3 + Math.random()*3) + "s";
        document.body.appendChild(emoji);
    }
}
</script>

</body>
</html>
