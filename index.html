<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Nicole ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    background: linear-gradient(135deg, #ffd6e8, #ffeef5);
    font-family: Arial, sans-serif;
    text-align:center;
    overflow:hidden;
}

.contenedor{
    margin-top:60px;
}

h1{
    font-size:26px;
    padding:20px;
}

.pregunta-gif{
    width:180px;
    border-radius:15px;
    margin-top:10px;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    margin:15px;
    cursor:pointer;
    transition:0.3s;
}

#si{
    background:#ff4d6d;
    color:white;
}

#no{
    background:white;
    position:absolute;
}

.gif-final{
    width:150px;
    margin:10px;
}
</style>
</head>

<body>

<div class="contenedor">
    <h1>Nicole… 🐱🦫<br>¿Quieres ser mi novia? 💖</h1>
    <img src="IMG_3410.gif" class="pregunta-gif">
    <br>
    <button id="si">Sí 💕</button>
    <button id="no">No 😢</button>
</div>

<script>
const botonNo = document.getElementById("no");
const botonSi = document.getElementById("si");

let escala = 1;

function moverBoton(){
    const ancho = window.innerWidth - 100;
    const alto = window.innerHeight - 50;
    const x = Math.random() * ancho;
    const y = Math.random() * alto;
    botonNo.style.left = x + "px";
    botonNo.style.top = y + "px";

    escala += 0.1;
    botonSi.style.transform = "scale(" + escala + ")";
}

botonNo.addEventListener("touchstart", moverBoton);
botonNo.addEventListener("click", moverBoton);

botonSi.addEventListener("click", function(){
    document.body.innerHTML = `
        <h1>Sabía que dirías que sí 😍🐱🦫<br>
        Ahora oficialmente eres mi persona favorita 💘</h1>
        <img src="IMG_3408.gif" class="gif-final">
        <img src="IMG_3409.gif" class="gif-final">
    `;
});
</script>

</body>
</html>
