<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<title>Para Nicole ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    background: linear-gradient(135deg, #ffd6e8, #ffeef5);
    font-family: Arial, sans-serif;
    text-align:center;
    overflow:hidden;
}

/* CONTENIDO PRINCIPAL */
.contenedor{
    margin-top:60px;
    position:relative;
    z-index:2;
}

h1{
    font-family: 'Great Vibes', cursive;
    font-size:42px;
    padding:20px;
    color:#d6336c;
}

.pregunta-gif{
    width:180px;
    border-radius:15px;
    margin-top:10px;
}

.botones{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    position:relative;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

#si{
    background:#ff4d6d;
    color:white;
}

#no{
    background:white;
    position:relative;
}

.gif-final{
    width:150px;
    margin:10px;
}

/* CAPA LLUVIA */
#lluvia{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
    overflow:hidden;
}

.emoji{
    position:absolute;
    animation: caer linear forwards;
}

@keyframes caer{
    from{
        transform: translateY(-10vh);
        opacity:1;
    }
    to{
        transform: translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="lluvia"></div>

<audio id="musica" src="grand-escape.m4a"></audio>

<div class="contenedor">
    <h1>Nicole… 🐱🦫<br>¿Quieres ser mi novia? 💖</h1>
    <img src="IMG_3410.gif" class="pregunta-gif">

    <div class="botones">
        <button id="si">Sí 💕</button>
        <button id="no">No 😢</button>
    </div>
</div>

<script>
const botonNo = document.getElementById("no");
const botonSi = document.getElementById("si");
const contenedorLluvia = document.getElementById("lluvia");
const musica = document.getElementById("musica");

let escala = 1;
let lluviaActiva = false;

function moverBoton(){
    botonNo.style.position = "absolute";

    const rect = botonNo.getBoundingClientRect();
    const ancho = window.innerWidth - rect.width;
    const alto = window.innerHeight - rect.height;

    const x = Math.random() * ancho;
    const y = Math.random() * alto;

    botonNo.style.left = x + "px";
    botonNo.style.top = y + "px";

    escala += 0.1;
    botonSi.style.transform = "scale(" + escala + ")";
}

/* Hover en escritorio */
botonNo.addEventListener("mouseenter", moverBoton);

/* Touch en móvil */
botonNo.addEventListener("touchstart", moverBoton);

/* Por si logra hacer click */
botonNo.addEventListener("click", moverBoton);

botonSi.addEventListener("click", function(){

    // Vibración en móvil
    if (navigator.vibrate) {
        navigator.vibrate(200);
    }

    // Efecto dramático
    botonSi.style.transform = "scale(1.5)";

    setTimeout(() => {

        // Música segura
        musica.volume = 0.6;
        musica.play().catch(() => {
            console.log("Autoplay bloqueado");
        });

        document.querySelector(".contenedor").innerHTML = `
            <h1>
            Sabía que dirías que sí 😍🐱🦫<br>
            Ahora oficialmente eres mi persona favorita 💘</h1>
            <img src="IMG_3408.gif" class="gif-final">
            <img src="IMG_3409.gif" class="gif-final">
        `;

        lluviaActiva = true;
        lluviaContinua();

    }, 300);
});

function crearEmoji(){
    const emojis = ["🐱","🦫","💖","💕"];
    const emoji = document.createElement("div");
    emoji.classList.add("emoji");
    emoji.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    emoji.style.left = Math.random()*100 + "vw";
    emoji.style.fontSize = (20 + Math.random()*25) + "px";
    emoji.style.animationDuration = (3 + Math.random()*2) + "s";

    contenedorLluvia.appendChild(emoji);

    setTimeout(() => {
        emoji.remove();
    }, 5000);
}

function lluviaContinua(){
    if(lluviaActiva){
        crearEmoji();
        setTimeout(lluviaContinua, 200);
    }
}
</script>

</body>
</html>
